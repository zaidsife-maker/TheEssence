<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة العلوم - Science Portal</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Icons (using Font Awesome for simplicity) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9597101491815208" crossorigin="anonymous"></script>
</head>

<body>

    <header>
        <button id="theme-toggle" class="theme-toggle" title="تبديل الوضع">
            <i class="fa-solid fa-moon"></i>
        </button>
        <div class="header-content">
            <span class="religious-text-main">السلام عليكم ورحمة الله</span>
            <span class="religious-text-sub">سبحان الله وبحمده سبحان الله العظيم</span>
        </div>
    </header>

    <nav>
        <button class="nav-btn active" data-tab="home">
            <i class="fa-solid fa-home"></i> الرئيسية
        </button>
        <button class="nav-btn" data-tab="physics">
            <i class="fa-solid fa-atom"></i> الفيزياء
        </button>
        <button class="nav-btn" data-tab="math">
            <i class="fa-solid fa-square-root-variable"></i> الرياضيات
        </button>
        <button class="nav-btn" data-tab="cs">
            <i class="fa-solid fa-laptop-code"></i> علوم الحاسوب
        </button>
    </nav>

    <main id="app-container">
        <!-- Content will be injected here by script.js -->
    </main>

    <div class="scroll-widget" title="أدوات القراءة">
        <i class="fa-solid fa-layer-group widget-icon"></i>
        <div class="scroll-controls">
            <button id="toggle-scroll" class="scroll-btn main-btn" title="تشغيل/إيقاف"><i
                    class="fa-solid fa-play"></i></button>
        </div>
        <div class="speed-control speed-control-group">
            <button id="speed-down" class="scroll-btn small-btn" title="تقليل السرعة"><i
                    class="fa-solid fa-minus"></i></button>
            <span id="speed-display">5</span>
            <button id="speed-up" class="scroll-btn small-btn" title="زيادة السرعة"><i
                    class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
